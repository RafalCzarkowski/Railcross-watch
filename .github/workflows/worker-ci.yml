name: Worker AI CI

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/worker-ai/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/worker-ai/**"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalacja uv
        run: pip install uv

      - name: Instalacja zależności Python
        run: uv sync --project apps/worker-ai

      - name: Lintowanie (ruff)
        run: uv run --project apps/worker-ai ruff check src/

      - name: Sprawdzanie typów (mypy)
        run: uv run --project apps/worker-ai mypy src/

      - name: Testy
        run: uv run --project apps/worker-ai pytest tests/ -v
